<figure class="chairimg">
    <a class="chairimg-photo-link" href="{{ .Get "link" }}">
        <img class="chairimg-photo" src="{{ .Get "src" }}" alt="{{ .Get "name" }}">
    </a>
    <figcaption>
        <a class="chairimglink" href="{{ .Get "link" }}"><b>{{ .Get "name" }}</b></a>
        <span>{{ .Get "affiliation" }}</span>
    </figcaption>
</figure>
